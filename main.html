<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>streetofasha • YoFashion</title>
    <style>
      :root{
        --bg0:#070910;
        --bg1:#0b1020;
        --card:rgba(255,255,255,.06);
        --card2:rgba(255,255,255,.08);
        --stroke:rgba(255,255,255,.10);
        --stroke2:rgba(255,255,255,.14);
        --text:#f7efe6;
        --muted:rgba(247,239,230,.72);
        --faint:rgba(247,239,230,.55);
        --good:#1de9b6;
        --warn:#ffb703;
        --bad:#ff5ca8;
        --shadow:0 18px 42px rgba(0,0,0,.45);
        --radius:16px;
        --radius2:22px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      *{ box-sizing:border-box; }
      html, body { height:100%; }
      body{
        margin:0;
        font-family:var(--sans);
        background:
          radial-gradient(1200px 900px at 15% 10%, rgba(29,233,182,.18), transparent 55%),
          radial-gradient(1100px 800px at 85% 15%, rgba(255,92,168,.15), transparent 55%),
          radial-gradient(900px 700px at 40% 95%, rgba(255,183,3,.12), transparent 60%),
          linear-gradient(180deg, var(--bg0), var(--bg1) 62%, #070814);
        color:var(--text);
      }
      a{ color: var(--good); text-decoration: none; }
      a:hover{ text-decoration: underline; }
      .wrap{ max-width: 1160px; margin: 0 auto; padding: 26px 18px 56px; }

      header{
        display:flex;
        gap:14px;
        align-items: center;
        justify-content: space-between;
        padding: 10px 2px 18px;
      }
      .brand{
        display:flex;
        gap:12px;
        align-items:center;
        min-width: 260px;
      }
      .logo{
        width: 44px; height: 44px;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(29,233,182,.9), rgba(255,92,168,.8));
        box-shadow: 0 12px 38px rgba(29,233,182,.12);
        border: 1px solid rgba(255,255,255,.18);
        position: relative;
        overflow: hidden;
      }
      .logo:before{
        content:"";
        position:absolute; inset:-40%;
        background:
          radial-gradient(circle at 40% 40%, rgba(255,255,255,.22), transparent 55%),
          radial-gradient(circle at 60% 65%, rgba(255,255,255,.10), transparent 60%);
        transform: rotate(18deg);
      }
      .brand h1{
        margin:0;
        font-size: 18px;
        letter-spacing: .2px;
        line-height: 1.2;
      }
      .brand .sub{
        margin-top: 2px;
        font-size: 12px;
        color: var(--muted);
      }

      .topbar{
        display:flex;
        gap:10px;
        align-items:center;
        justify-content:flex-end;
        flex-wrap: wrap;
      }
      .pill{
        display:inline-flex;
        gap:8px;
        align-items:center;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255,255,255,.06);
        border: 1px solid rgba(255,255,255,.10);
        color: var(--muted);
        font-size: 12px;
        max-width: 480px;
      }
      .pill code{
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text);
        background: rgba(255,255,255,.08);
        padding: 2px 6px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,.10);
      }
      .btn{
        border: 1px solid rgba(255,255,255,.14);
        background: rgba(255,255,255,.06);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 13px;
        cursor: pointer;
        transition: transform .05s ease, background .16s ease, border-color .16s ease;
      }
      .btn:hover{ background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.20); }
      .btn:active{ transform: translateY(1px); }
      .btn.primary{
        background: linear-gradient(135deg, rgba(29,233,182,.86), rgba(29,233,182,.34));
        border-color: rgba(29,233,182,.32);
        color: #041011;
        font-weight: 650;
      }
      .btn.ghost{ background: transparent; border-color: rgba(255,255,255,.16); }
      .btn.bad{ background: rgba(255,92,168,.15); border-color: rgba(255,92,168,.25); }

      .grid{
        display:grid;
        grid-template-columns: 420px 1fr;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 1020px){
        .grid{ grid-template-columns: 1fr; }
      }

      .card{
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: var(--radius2);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .card .hd{
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255,255,255,.08);
        background: rgba(255,255,255,.03);
        display:flex;
        align-items:center;
        justify-content: space-between;
        gap: 10px;
      }
      .card .hd h2{
        margin:0;
        font-size: 14px;
        letter-spacing: .25px;
      }
      .card .bd{
        padding: 14px 16px 16px;
      }
      .card .ft{
        padding: 12px 16px;
        border-top: 1px solid rgba(255,255,255,.08);
        background: rgba(255,255,255,.03);
        display:flex;
        align-items:center;
        justify-content:flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }
      .row{ display:flex; gap:12px; flex-wrap: wrap; }
      .col{ flex: 1 1 0; min-width: 160px; }
      label{ display:block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
      input, select, textarea{
        width:100%;
        color: var(--text);
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 12px;
        padding: 10px 11px;
        outline: none;
        font-size: 13px;
      }
      textarea{ min-height: 92px; resize: vertical; }
      input:focus, select:focus, textarea:focus{
        border-color: rgba(29,233,182,.32);
        box-shadow: 0 0 0 3px rgba(29,233,182,.12);
      }
      .mini{
        font-size: 12px; color: var(--muted);
        line-height: 1.35;
      }
      .hint{
        margin-top: 8px;
        padding: 10px 12px;
        background: rgba(255,255,255,.04);
        border: 1px solid rgba(255,255,255,.10);
        border-radius: 14px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }
      .hr{
        height: 1px;
        background: rgba(255,255,255,.08);
        margin: 14px 0;
      }

      .palettes{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 560px){
        .palettes{ grid-template-columns: 1fr; }
      }
      .palette{
        border: 1px solid rgba(255,255,255,.10);
        border-radius: 16px;
        overflow:hidden;
        cursor:pointer;
        background: rgba(255,255,255,.04);
        transition: transform .08s ease, border-color .14s ease, background .14s ease;
      }
      .palette:hover{ transform: translateY(-1px); border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.06); }
      .palette.sel{ border-color: rgba(29,233,182,.36); background: rgba(29,233,182,.08); }
      .palette .top{
        padding: 10px 12px;
        display:flex;
        justify-content: space-between;
        align-items:center;
        gap: 10px;
      }
      .palette .name{
        font-size: 13px;
        font-weight: 650;
        letter-spacing: .15px;
      }
      .badge{
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,.14);
        background: rgba(255,255,255,.06);
        color: var(--muted);
        white-space: nowrap;
      }
      .swatches{
        display:flex;
        height: 20px;
      }
      .swatch{ flex:1; }
      .palette .meta{
        padding: 10px 12px 12px;
        color: var(--muted);
        font-size: 12px;
        display:flex;
        justify-content: space-between;
        gap: 10px;
      }

      .preview{
        display:grid;
        grid-template-columns: 380px 1fr;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 960px){
        .preview{ grid-template-columns: 1fr; }
      }
      .art{
        border-radius: 18px;
        overflow:hidden;
        border: 1px solid rgba(255,255,255,.10);
        background: rgba(0,0,0,.14);
      }
      .art .bar{
        padding: 10px 12px;
        display:flex;
        gap: 10px;
        align-items:center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255,255,255,.08);
        background: rgba(255,255,255,.03);
      }
      .art .bar .small{ font-size: 12px; color: var(--muted); }
      .art .svg{
        width: 100%;
        aspect-ratio: 1 / 1;
        display:block;
      }
      .art img{ width:100%; height:100%; display:block; }

      .panel{
        display:grid;
        gap: 12px;
      }
      .kpi{
        display:grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }
      @media (max-width: 680px){
        .kpi{ grid-template-columns: 1fr; }
      }
      .kpi .box{
        border: 1px solid rgba(255,255,255,.10);
        border-radius: 16px;
        padding: 12px;
        background: rgba(255,255,255,.04);
      }
      .kpi .box .k{ color: var(--muted); font-size: 12px; }
      .kpi .box .v{ font-size: 14px; font-weight: 650; margin-top: 4px; }

      .sectionTitle{
        margin: 0;
        font-size: 13px;
        letter-spacing: .2px;
      }
      .list{
        margin: 0;
        padding: 0 0 0 18px;
        color: var(--text);
        line-height: 1.4;
      }
      .list li{ margin: 6px 0; }

      .lookTitle{
        font-size: 16px;
        font-weight: 750;
        margin: 0;
        letter-spacing: .2px;
      }
      .notes{
        white-space: pre-wrap;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.45;
        border: 1px solid rgba(255,255,255,.10);
        border-radius: 16px;
        padding: 12px;
        background: rgba(255,255,255,.03);
